<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>プゥル・ヴー 納品書発行システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f8f7f4;min-height:100vh}
input,select,button{font-family:'Noto Sans JP',sans-serif}
.header{background:#1a1a2e;color:#fff;padding:0 24px;display:flex;align-items:center;gap:16px;height:64px}
.logo{font-size:16px;font-weight:600;color:#e8d5b7;line-height:1.3}
.logo-sub{font-size:11px;color:#aaa}
.nav{display:flex;gap:2px;margin-left:auto;flex-wrap:nowrap}
.nav button{background:transparent;color:#ccc;border:none;cursor:pointer;padding:6px 12px;border-radius:6px;font-size:12px;white-space:nowrap}
.nav button.active{background:#e8d5b7;color:#1a1a2e;font-weight:600}
.content{max-width:1100px;margin:0 auto;padding:24px 16px}
.card{background:#fff;border-radius:12px;border:.5px solid #e0ddd6;padding:24px;margin-bottom:16px}
.card h3{font-size:16px;font-weight:600;color:#1a1a2e;margin-bottom:16px}
label.lbl{font-size:12px;color:#888;margin-bottom:4px;display:block}
input[type=text],input[type=date],input[type=number],select{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff}
input[type=number]{text-align:center}
table{width:100%;border-collapse:collapse}
th{padding:10px 8px;background:#f5f3ef;font-size:12px;color:#555;text-align:left;border-bottom:1px solid #e0ddd6}
td{padding:9px 8px;border-bottom:.5px solid #f0ede8;font-size:13px}
.btn-primary{background:#1a1a2e;color:#e8d5b7;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.btn-danger{background:#c62828;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.btn-edit{background:#e8f0fe;color:#1a73e8;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;margin-right:4px}
.btn-save{background:#e8f5e9;color:#2e7d32;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;margin-right:4px}
.btn-cancel{background:#eee;color:#333;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px}
.btn-reprint{background:#f0ede8;color:#333;border:none;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;margin-right:6px}
.code-badge{background:#f0ede8;padding:2px 8px;border-radius:4px;font-size:11px}
.inv-badge{background:#e8f5e9;color:#2e7d32;padding:2px 10px;border-radius:12px;font-size:11px}
.toast{position:fixed;top:70px;right:20px;z-index:9999;padding:10px 20px;border-radius:8px;font-size:14px;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:24px;max-width:920px;width:95%;max-height:90vh;overflow-y:auto}
.hidden{display:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.issue-btn{background:#1a1a2e;color:#e8d5b7;border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;width:100%;margin-top:16px}
.total-row{display:flex;justify-content:flex-end;gap:24px;padding:16px 0;border-top:2px solid #1a1a2e;margin-top:8px;align-items:center}
.guide-step{display:flex;gap:16px;margin-bottom:14px;align-items:flex-start}
.guide-num{background:#1a1a2e;color:#e8d5b7;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.guide-note{background:#fffbf0;border:1px solid #f0d080;border-radius:8px;padding:10px 16px;font-size:13px;color:#7a5c00;line-height:1.7;margin-top:8px}
.guide-warn{background:#fff5f5;border:1px solid #f0b0b0;border-radius:8px;padding:10px 16px;font-size:13px;color:#8a2020;line-height:1.7;margin-top:8px}
.guide-badge{display:inline-block;background:#1a1a2e;color:#e8d5b7;border-radius:4px;padding:1px 8px;font-size:12px;font-weight:600;margin-right:6px}
.guide-h3{font-size:16px;font-weight:600;color:#1a1a2e;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #e8d5b7}
.stat-card{background:#f5f3ef;border-radius:8px;padding:12px 16px}
.stat-label{font-size:12px;color:#888}
.stat-val{font-size:22px;font-weight:600;color:#1a1a2e}
@media print{
  body *{visibility:hidden!important}
  #print-area,#print-area *{visibility:visible!important}
  #print-area{position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex!important;box-sizing:border-box;padding:4mm;overflow:hidden}
  #print-area>div:first-child,#print-area>div:last-child{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #print-area table{flex:1;table-layout:fixed}
  #print-area tbody{display:table-row-group}
  #print-area tbody tr{height:auto}
  @page{size:B5 landscape;margin:0}
  html,body{height:100%;overflow:hidden}
}
</style>
</head>

let state={
  tab:0,
  tabHistory:[],
  tabHistory:[],
  tabHistory:[],
  tabHistory:[],
  tabHistory:[],
  customers:load("pv_customers",INIT_CUSTOMERS),
  products:load("pv_products",INIT_PRODUCTS),
  prices:load("pv_prices",INIT_PRICES),
  history:load("pv_history",[]),
  minG:load("pv_min",INIT_MIN),
  issue:{customer:"",deliveryDate:"",items:[],customItems:[{name:"",qty:"",price:""}],useCustom:false},
  histSearch:"",
  editingCustomer:null,
  editingProduct:null,
  editingPrice:null,
  filterCustomer:"",
  showPrint:false,
  printInvoice:null,
  showAddCustomer:false,
  customerDetail:null,
  showAddProduct:false,
  showAddPrice:false,
  newCustomer:{id:"",name:""},
  newProduct:{code:"",name:""},
  newPrice:{customer:"",code:"",name:"",price:""},
};

function load(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch{return fb;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function saveAll(){save("pv_customers",state.customers);save("pv_products",state.products);save("pv_prices",state.prices);save("pv_history",state.history);save("pv_min",state.minG);}

function fmtDate(d){if(!d)return"";const dt=d instanceof Date?d:new Date(d);if(isNaN(dt))return"";return`${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,"0")}/${String(dt.getDate()).padStart(2,"0")}`;}
function toInput(d){if(!d)return"";const dt=d instanceof Date?d:new Date(d);if(isNaN(dt))return"";return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;}
function fromInput(s){if(!s)return new Date();const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function nextDelivery(name){const cycle=DELIVERY_CYCLES[name];if(!cycle)return new Date();const t=new Date();for(let i=1;i<=7;i++){const d=new Date(t);d.setDate(t.getDate()+i);if(cycle.includes(DAY_NAMES[d.getDay()]))return d;}return new Date();}
function nextInvoiceNo(custName){const c=state.customers.find(x=>x.name===custName);if(!c)return"000-001";const no=c.id;const rel=state.history.filter(h=>h.invoiceNo&&h.invoiceNo.startsWith(no+"-"));if(!rel.length)return`${no}-001`;const mx=Math.max(...rel.map(h=>parseInt(h.invoiceNo.split("-")[1]||0)));return`${no}-${String(mx+1).padStart(3,"0")}`;}
function getSubtotal(){const items=activeItems();return items.reduce((s,i)=>{const q=parseFloat(i.qty)||0;const p=parseFloat(i.price)||0;return s+q*p;},0);}
function activeItems(){if(state.issue.useCustom)return state.issue.customItems.filter(i=>i.name&&i.qty&&parseFloat(i.qty)>0);return state.issue.items.filter(i=>i.qty&&parseFloat(i.qty)>0);}
function getTotal(){const sub=getSubtotal();const mg=state.minG[state.issue.customer]||0;return Math.max(sub,mg);}

function showToast(msg,type="success"){const t=document.getElementById("toast");t.textContent=msg;t.style.background=type==="success"?"#2d6a4f":"#c62828";t.classList.remove("hidden");setTimeout(()=>t.classList.add("hidden"),2500);}

// --- Render ---
function render(){
  renderNav();
  const main=document.getElementById("main");
  if(state.tab===0)main.innerHTML=renderIssueTab();
  else if(state.tab===1)main.innerHTML=renderHistoryTab();
  else if(state.tab===2)main.innerHTML=renderCustomerTab();
  else if(state.tab===3)main.innerHTML=renderProductTab();
  else if(state.tab===4)main.innerHTML=renderPriceTab();
  else if(state.tab===5)main.innerHTML=renderSettingsTab();
  else if(state.tab===6)main.innerHTML=renderGuideTab();
  bindEvents();
  if(state.showPrint)renderPrintModal();
}

function renderNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML=TABS.map((t,i)=>`<button class="${state.tab===i?"active":""}" onclick="setTab(${i})">${t}</button>`).join("");
  const backBtn=document.getElementById("back-btn");
  if(state.tabHistory.length>0||state.customerDetail){
    backBtn.style.display="inline-block";
  } else {
    backBtn.style.display="none";
  }
}

function setTab(i){
  state.tabHistory.push(state.tab);
  if(state.tabHistory.length>20)state.tabHistory.shift();
  state.tab=i;
  state.customerDetail=null;
  render();
}

function goBack(){
  if(state.customerDetail){state.customerDetail=null;render();return;}
  if(state.tabHistory.length>0){
    state.tab=state.tabHistory.pop();
    render();
  }
}

// --- Issue Tab ---
function renderIssueTab(){
  const iss=state.issue;
  const today=new Date();
  const mg=state.minG[iss.customer]||0;
  const sub=getSubtotal();
  const total=getTotal();
  const custOpts=state.customers.map(c=>`<option value="${c.name}"${iss.customer===c.name?"selected":""}>${c.name}</option>`).join("");
  const invNo=iss.customer?nextInvoiceNo(iss.customer):"—";
  const cycle=iss.customer?DELIVERY_CYCLES[iss.customer]:"";

  let itemsHtml="";
  if(!iss.useCustom&&iss.items.length>0){
    itemsHtml=`<table><thead><tr><th>商品コード</th><th>品名</th><th>単価</th><th style="width:100px">数量</th><th style="text-align:right">金額</th></tr></thead><tbody>`;
    iss.items.forEach((item,i)=>{
      const amt=item.qty?(parseInt(item.qty)*item.price).toLocaleString():"—";
      itemsHtml+=`<tr style="background:${item.qty?"#fafff8":""}"><td><span class="code-badge">${item.code}</span></td><td>${item.name}</td><td>¥${item.price.toLocaleString()}</td><td><input type="number" min="0" value="${item.qty||""}" style="width:80px;text-align:center" data-qty-idx="${i}" onchange="setItemQty(${i},this.value)" onkeydown="qtyKeyDown(event,${i})"></td><td style="text-align:right;font-weight:${item.qty?600:400}">${item.qty?"¥"+amt:"—"}</td></tr>`;
    });
    itemsHtml+=`</tbody></table>`;
  } else {
    itemsHtml=iss.customItems.map((item,i)=>`<div style="display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;margin-bottom:8px"><input placeholder="品名" value="${item.name}" oninput="setCustomItem(${i},'name',this.value)"><input type="number" placeholder="数量" value="${item.qty}" oninput="setCustomItem(${i},'qty',this.value)"><input type="number" placeholder="単価" value="${item.price}" oninput="setCustomItem(${i},'price',this.value)"><button onclick="removeCustomItem(${i})" style="background:#fee;border:1px solid #fcc;border-radius:6px;cursor:pointer;padding:0 10px;color:#c62828">✕</button></div>`).join("");
    itemsHtml+=`<button onclick="addCustomItem()" style="background:#f5f3ef;border:1px solid #ddd;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px">＋ 行追加</button>`;
  }

  return`<h2 style="font-size:20px;font-weight:600;margin-bottom:20px;color:#1a1a2e">納品書発行</h2>
  <div class="card">
    <div class="grid3">
      <div><label class="lbl">客先</label><select onchange="selectCustomer(this.value)"><option value="">-- 客先を選択 --</option>${custOpts}</select></div>
      <div><label class="lbl">入力日</label><input type="text" value="${fmtDate(today)}" readonly></div>
      <div><label class="lbl">納品日</label>${iss.customer
        ?`<input type="date" value="${iss.deliveryDate}" onchange="state.issue.deliveryDate=this.value;render()">${cycle?`<div style="margin-top:4px;font-size:12px;color:#888">サイクル：${cycle}</div>`:""}`
        :`<input type="date" style="color:transparent">`}
      </div>
    </div>
    ${iss.customer?`<div style="margin-top:8px;font-size:13px;color:#666">伝票番号（予定）：<strong>${invNo}</strong>${mg>0?`<span style="margin-left:16px;color:#c17a00">最低保証：¥${mg.toLocaleString()}</span>`:""}
    </div>`:""}
  </div>
  ${iss.customer?`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="margin:0">品目・数量入力</h3>
      <label style="font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px"><input type="checkbox" ${iss.useCustom?"checked":""} onchange="toggleCustom(this.checked)"> 自由入力モード</label>
    </div>
    ${itemsHtml}
    <div class="total-row">
      ${mg>0&&sub<mg?`<div style="font-size:13px;color:#c17a00">小計 ¥${sub.toLocaleString()} → 最低保証 ¥${mg.toLocaleString()} 適用</div>`:""}
      <div><div style="font-size:14px;color:#666">合計金額</div><div style="font-size:20px;font-weight:700;color:#1a1a2e">¥${total.toLocaleString()}</div></div>
    </div>
    <button class="issue-btn" onclick="issueInvoice()">納品書を発行する</button>
  </div>`:""}`;
}

function selectCustomer(name){
  state.issue.customer=name;
  if(!name){state.issue.items=[];state.issue.deliveryDate="";render();return;}
  state.issue.deliveryDate=toInput(nextDelivery(name));
  const cp=state.prices.filter(p=>p.customer===name);
  state.issue.items=cp.map(p=>({...p,qty:""}));
  state.issue.useCustom=cp.length===0;
  render();
}
function setItemQty(i,v){state.issue.items[i].qty=v;render();}
function qtyKeyDown(e,i){
  if(e.key==="Enter"){
    e.preventDefault();
    state.issue.items[i].qty=e.target.value;
    const inputs=document.querySelectorAll("[data-qty-idx]");
    const next=Array.from(inputs).find(el=>parseInt(el.dataset.qtyIdx)>i);
    if(next){next.focus();next.select();}
    else{const btn=document.querySelector(".issue-btn");if(btn)btn.focus();}
  }
}
function setCustomItem(i,k,v){state.issue.customItems[i][k]=v;render();}
function addCustomItem(){state.issue.customItems.push({name:"",qty:"",price:""});render();}
function removeCustomItem(i){state.issue.customItems.splice(i,1);render();}
function toggleCustom(v){state.issue.useCustom=v;render();}
function issueInvoice(){
  if(!state.issue.customer){showToast("客先を選択してください","error");return;}
  const items=activeItems();
  if(!items.length){showToast("数量を入力してください","error");return;}
  const sub=getSubtotal();const mg=state.minG[state.issue.customer]||0;const total=Math.max(sub,mg);
  const inv={id:Date.now(),invoiceNo:nextInvoiceNo(state.issue.customer),customer:state.issue.customer,deliveryDate:state.issue.deliveryDate?fromInput(state.issue.deliveryDate):new Date(),issueDate:new Date(),items,subtotal:sub,minGuarantee:mg,total};
  state.history.unshift(inv);save("pv_history",state.history);
  state.printInvoice=inv;state.showPrint=true;render();
}

// --- History Tab ---
function renderHistoryTab(){
  const filtered=state.history.filter(h=>!state.histSearch||h.customer?.includes(state.histSearch)||h.invoiceNo?.includes(state.histSearch));
  const rows=filtered.length?filtered.map(h=>`<tr><td><span class="inv-badge">${h.invoiceNo}</span></td><td>${h.customer}</td><td>${fmtDate(h.deliveryDate)}</td><td>${fmtDate(h.issueDate)}</td><td style="text-align:right;font-weight:600">¥${h.total?.toLocaleString()}</td><td><button class="btn-reprint" onclick="reprintInvoice(${h.id})">再印刷</button><button class="btn-danger" onclick="deleteHistory(${h.id})">削除</button></td></tr>`).join(""):`<tr><td colspan="6" style="text-align:center;color:#aaa;padding:40px">履歴がありません</td></tr>`;
  return`<h2 style="font-size:20px;font-weight:600;margin-bottom:20px;color:#1a1a2e">発行履歴</h2>
  <div class="card"><input type="text" placeholder="客先名・伝票番号で検索" value="${state.histSearch}" oninput="state.histSearch=this.value;render()" style="margin-bottom:16px">
  <table><thead><tr><th>伝票番号</th><th>客先名</th><th>納品日</th><th>発行日</th><th style="text-align:right">合計金額</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function reprintInvoice(id){const inv=state.history.find(h=>h.id===id);if(!inv)return;state.printInvoice=inv;state.showPrint=true;render();}
function deleteHistory(id){if(!confirm("この履歴を削除しますか？"))return;state.history=state.history.filter(h=>h.id!==id);save("pv_history",state.history);showToast("削除しました");render();}

// --- Customer Tab ---
function renderCustomerTab(){
  if(state.customerDetail) return renderCustomerDetail();
  const rows=state.customers.map(c=>{
    return`<tr><td><span class="code-badge">${c.id}</span></td><td><a href="#" onclick="openCustomerDetail('${c.id}');return false;" style="color:#1a73e8;text-decoration:none;font-weight:500">${c.name}</a></td><td>${state.minG[c.name]>0?"¥"+(state.minG[c.name]).toLocaleString():"—"}</td><td>${(DELIVERY_CYCLES[c.name]||"—")}</td><td><button class="btn-edit" onclick="openCustomerDetail('${c.id}')">詳細編集</button><button class="btn-danger" onclick="deleteCustomer('${c.id}')">削除</button></td></tr>`;
  }).join("");
  const addForm=state.showAddCustomer?`<div class="card" style="background:#fffef7;margin-bottom:16px"><div style="display:grid;grid-template-columns:80px 1fr 160px auto;gap:10px;align-items:end">
    <div><label class="lbl">No.</label><input placeholder="021" value="${state.newCustomer.id}" oninput="state.newCustomer.id=this.value"></div>
    <div><label class="lbl">客先名</label><input placeholder="会社名" value="${state.newCustomer.name}" oninput="state.newCustomer.name=this.value"></div>
    <div><label class="lbl">最低保証金額</label><input type="number" value="${state.minG[state.newCustomer.name]||""}" oninput="state.minG[state.newCustomer.name]=parseInt(this.value)||0"></div>
    <button class="btn-primary" onclick="addCustomer()">追加</button></div></div>`:"";
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:20px;font-weight:600;color:#1a1a2e;margin:0">客先管理</h2><button class="btn-primary" onclick="state.showAddCustomer=!state.showAddCustomer;render()">＋ 客先追加</button></div>
  ${addForm}<div class="card"><table><thead><tr><th style="width:70px">No.</th><th>客先名</th><th style="width:120px">最低保証金額</th><th style="width:100px">納品サイクル</th><th style="width:130px">操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function openCustomerDetail(id){
  const c=state.customers.find(x=>x.id===id);
  const custPrices=state.prices.filter(p=>p.customer===c.name);
  state.customerDetail={
    id,name:c.name,originalName:c.name,
    mg:state.minG[c.name]||0,
    cycle:DELIVERY_CYCLES[c.name]||"",
    prices:custPrices.map(p=>({...p})),
  };
  render();
}

function renderCustomerDetail(){
  const d=state.customerDetail;
  const DAY_BTNS=["月","火","水","木","金","土","日"];
  const cycleButtons=DAY_BTNS.map(day=>{
    const active=d.cycle.includes(day);
    return`<button onclick="toggleCycleDay('${day}')" style="padding:6px 12px;border:1px solid ${active?"#1a1a2e":"#ddd"};background:${active?"#1a1a2e":"#fff"};color:${active?"#e8d5b7":"#333"};border-radius:6px;cursor:pointer;font-size:14px">${day}</button>`;
  }).join("");

  const priceRows=d.prices.map((p,i)=>`<tr>
    <td><span class="code-badge">${p.code}</span></td>
    <td><input value="${p.name}" oninput="state.customerDetail.prices[${i}].name=this.value" style="width:100%;padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px"></td>
    <td><input type="number" value="${p.price}" oninput="state.customerDetail.prices[${i}].price=parseInt(this.value)||0" style="width:80px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px;text-align:right"></td>
    <td><button class="btn-danger" onclick="removeDetailPrice(${i})">削除</button></td>
  </tr>`).join("");

  const prodOpts=state.products.map(p=>`<option value="${p.code}">${p.code} ${p.name}</option>`).join("");

  return`
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <button onclick="state.customerDetail=null;render()" style="background:#f0ede8;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px">← 一覧に戻る</button>
    <h2 style="font-size:20px;font-weight:600;color:#1a1a2e;margin:0">${d.name}</h2>
  </div>

  <div class="card">
    <h3>基本情報</h3>
    <div class="grid3" style="gap:16px">
      <div><label class="lbl">客先名</label><input value="${d.name}" oninput="state.customerDetail.name=this.value"></div>
      <div><label class="lbl">最低保証金額（円）</label><input type="number" value="${d.mg}" oninput="state.customerDetail.mg=parseInt(this.value)||0"></div>
      <div><label class="lbl">客先No.</label><input value="${d.id}" readonly style="background:#f5f3ef;color:#888"></div>
    </div>
  </div>

  <div class="card">
    <h3>納品サイクル</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap">${cycleButtons}</div>
    <div style="margin-top:10px;font-size:13px;color:#888">現在の設定：<strong>${d.cycle||"未設定"}</strong></div>
  </div>

  <div class="card">
    <h3>品目・単価</h3>
    <table style="margin-bottom:12px">
      <thead><tr><th style="width:80px">コード</th><th>品名</th><th style="width:90px;text-align:right">単価</th><th style="width:70px">操作</th></tr></thead>
      <tbody>${priceRows}</tbody>
    </table>
    <div style="display:grid;grid-template-columns:1fr 2fr 100px auto;gap:8px;align-items:end;padding-top:12px;border-top:.5px solid #f0ede8">
      <div><label class="lbl">商品コード</label><select id="dp-code" onchange="setDetailNewCode(this.value)"><option value="">-- 選択 --</option>${prodOpts}</select></div>
      <div><label class="lbl">品名</label><input id="dp-name" placeholder="自動入力"></div>
      <div><label class="lbl">単価</label><input id="dp-price" type="number" placeholder="0"></div>
      <button class="btn-primary" onclick="addDetailPrice()" style="margin-top:20px">＋ 追加</button>
    </div>
  </div>

  <div style="display:flex;gap:12px;justify-content:flex-end">
    <button onclick="state.customerDetail=null;render()" class="btn-cancel" style="padding:10px 24px;font-size:14px">キャンセル</button>
    <button onclick="saveCustomerDetail()" class="btn-primary" style="padding:10px 32px;font-size:14px">保存する</button>
  </div>`;
}

function toggleCycleDay(day){
  const d=state.customerDetail;
  if(d.cycle.includes(day)){d.cycle=d.cycle.replace(day,"");}
  else{
    const order=["月","火","水","木","金","土","日"];
    let c=d.cycle+day;
    d.cycle=order.filter(x=>c.includes(x)).join("");
  }
  render();
}

function setDetailNewCode(v){
  const p=state.products.find(x=>x.code===v);
  document.getElementById("dp-name").value=p?.name||"";
}

function addDetailPrice(){
  const code=document.getElementById("dp-code").value;
  const name=document.getElementById("dp-name").value;
  const price=parseInt(document.getElementById("dp-price").value)||0;
  if(!code||!name){showToast("コードと品名を入力してください","error");return;}
  state.customerDetail.prices.push({customer:state.customerDetail.name,code,name,price});
  render();
}

function removeDetailPrice(i){
  state.customerDetail.prices.splice(i,1);render();
}

function saveCustomerDetail(){
  const d=state.customerDetail;
  state.customers=state.customers.map(c=>c.id===d.id?{...c,name:d.name}:c);
  if(d.originalName!==d.name){
    state.minG[d.name]=state.minG[d.originalName]||0;
    delete state.minG[d.originalName];
    DELIVERY_CYCLES[d.name]=DELIVERY_CYCLES[d.originalName];
    delete DELIVERY_CYCLES[d.originalName];
    state.prices=state.prices.map(p=>p.customer===d.originalName?{...p,customer:d.name}:p);
  }
  state.minG[d.name]=d.mg;
  DELIVERY_CYCLES[d.name]=d.cycle;
  state.prices=state.prices.filter(p=>p.customer!==d.name);
  state.prices.push(...d.prices.map(p=>({...p,customer:d.name})));
  state.customerDetail=null;saveAll();showToast("保存しました");render();
}

function editCustomer(id){const c=state.customers.find(x=>x.id===id);state.editingCustomer={id,name:c.name,originalName:c.name,mg:state.minG[c.name]||0};render();}
function saveCustomer(id){
  const ec=state.editingCustomer;
  state.customers=state.customers.map(c=>c.id===id?{...c,name:ec.name}:c);
  if(ec.originalName!==ec.name){state.minG[ec.name]=state.minG[ec.originalName]||0;delete state.minG[ec.originalName];}
  if(ec.mg!==undefined)state.minG[ec.name]=ec.mg;
  state.editingCustomer=null;saveAll();showToast("更新しました");render();
}
function deleteCustomer(id){if(!confirm("削除しますか？"))return;state.customers=state.customers.filter(c=>c.id!==id);saveAll();showToast("削除しました");render();}
function addCustomer(){
  const nc=state.newCustomer;
  if(!nc.id||!nc.name){showToast("Noと客先名を入力してください","error");return;}
  if(state.customers.find(c=>c.id===nc.id)){showToast("同じNoが存在します","error");return;}
  state.customers.push({id:nc.id,name:nc.name});state.newCustomer={id:"",name:""};state.showAddCustomer=false;saveAll();showToast("追加しました");render();
}

// --- Product Tab ---
function renderProductTab(){
  const items=state.products.map(p=>{
    if(state.editingProduct?.code===p.code)return`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:.5px solid #e8e5df;border-radius:8px"><span class="code-badge" style="min-width:48px;text-align:center">${p.code}</span><input value="${state.editingProduct.name}" oninput="state.editingProduct.name=this.value" style="flex:1;padding:4px 8px;border:1px solid #ddd;border-radius:6px"><button class="btn-save" onclick="saveProduct('${p.code}')">✓</button><button class="btn-cancel" onclick="state.editingProduct=null;render()">✕</button></div>`;
    return`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:.5px solid #e8e5df;border-radius:8px"><span class="code-badge" style="min-width:48px;text-align:center">${p.code}</span><span style="flex:1;font-size:13px">${p.name}</span><button onclick="state.editingProduct={code:'${p.code}',name:'${p.name}'};render()" style="background:transparent;border:none;cursor:pointer;color:#1a73e8">編</button><button onclick="deleteProduct('${p.code}')" style="background:transparent;border:none;cursor:pointer;color:#c62828">✕</button></div>`;
  }).join("");
  const addForm=state.showAddProduct?`<div class="card" style="background:#fffef7;margin-bottom:16px"><div style="display:grid;grid-template-columns:120px 1fr auto;gap:10px;align-items:end">
    <div><label class="lbl">商品コード</label><input placeholder="W061" value="${state.newProduct.code}" oninput="state.newProduct.code=this.value"></div>
    <div><label class="lbl">品名</label><input placeholder="品名" value="${state.newProduct.name}" oninput="state.newProduct.name=this.value"></div>
    <button class="btn-primary" onclick="addProduct()">追加</button></div></div>`:"";
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:20px;font-weight:600;color:#1a1a2e;margin:0">商品管理</h2><button class="btn-primary" onclick="state.showAddProduct=!state.showAddProduct;render()">＋ 商品追加</button></div>
  ${addForm}<div class="card"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">${items}</div></div>`;
}
function saveProduct(code){state.products=state.products.map(p=>p.code===code?{...p,name:state.editingProduct.name}:p);state.editingProduct=null;saveAll();showToast("更新しました");render();}
function deleteProduct(code){if(!confirm("削除しますか？"))return;state.products=state.products.filter(p=>p.code!==code);saveAll();showToast("削除しました");render();}
function addProduct(){const np=state.newProduct;if(!np.code||!np.name){showToast("コードと品名を入力","error");return;}if(state.products.find(p=>p.code===np.code)){showToast("同じコードが存在します","error");return;}state.products.push({code:np.code,name:np.name});state.newProduct={code:"",name:""};state.showAddProduct=false;saveAll();showToast("追加しました");render();}

// --- Price Tab ---
function renderPriceTab(){
  const filtered=state.prices.filter(p=>!state.filterCustomer||p.customer===state.filterCustomer);
  const custOpts=state.customers.map(c=>`<option value="${c.name}"${state.filterCustomer===c.name?"selected":""}>${c.name}</option>`).join("");
  const rows=filtered.map((p,fi)=>{
    const ri=state.prices.indexOf(p);
    if(state.editingPrice?.idx===ri)return`<tr><td>${p.customer}</td><td><span class="code-badge">${p.code}</span></td><td><input value="${state.editingPrice.name}" oninput="state.editingPrice.name=this.value" style="padding:4px 8px;border:1px solid #ddd;border-radius:6px"></td><td style="text-align:right"><input type="number" value="${state.editingPrice.price}" oninput="state.editingPrice.price=parseInt(this.value)||0" style="width:80px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;text-align:right"></td><td><button class="btn-save" onclick="savePrice(${ri})">保存</button><button class="btn-cancel" onclick="state.editingPrice=null;render()">取消</button></td></tr>`;
    return`<tr><td>${p.customer}</td><td><span class="code-badge">${p.code}</span></td><td>${p.name}</td><td style="text-align:right">¥${p.price.toLocaleString()}</td><td><button class="btn-edit" onclick="state.editingPrice={idx:${ri},name:'${p.name}',price:${p.price}};render()">編集</button><button class="btn-danger" onclick="deletePrice(${ri})">削除</button></td></tr>`;
  }).join("");
  const prodOpts=state.products.map(p=>`<option value="${p.code}">${p.code} ${p.name}</option>`).join("");
  const custOpts2=state.customers.map(c=>`<option value="${c.name}">${c.name}</option>`).join("");
  const addForm=state.showAddPrice?`<div class="card" style="background:#fffef7;margin-bottom:16px"><div style="display:grid;grid-template-columns:2fr 1fr 2fr 1fr auto;gap:10px;align-items:end">
    <div><label class="lbl">客先</label><select oninput="state.newPrice.customer=this.value"><option value="">-- 選択 --</option>${custOpts2}</select></div>
    <div><label class="lbl">商品コード</label><select oninput="setNewPriceCode(this.value)"><option value="">-- 選択 --</option>${prodOpts}</select></div>
    <div><label class="lbl">品名（省略可）</label><input value="${state.newPrice.name}" oninput="state.newPrice.name=this.value"></div>
    <div><label class="lbl">単価</label><input type="number" value="${state.newPrice.price}" oninput="state.newPrice.price=this.value" placeholder="0"></div>
    <button class="btn-primary" onclick="addPrice()">追加</button></div></div>`:"";
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:20px;font-weight:600;color:#1a1a2e;margin:0">単価対応表</h2><button class="btn-primary" onclick="state.showAddPrice=!state.showAddPrice;render()">＋ 追加</button></div>
  ${addForm}<div class="card">
  <select onchange="state.filterCustomer=this.value;render()" style="margin-bottom:16px;padding:8px 12px;border:1px solid #ddd;border-radius:8px"><option value="">全客先表示</option>${custOpts}</select>
  <div style="font-size:13px;color:#888;margin-bottom:8px">${filtered.length} 件</div>
  <table><thead><tr><th>客先名</th><th>コード</th><th>品名</th><th style="text-align:right">単価</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function setNewPriceCode(v){const p=state.products.find(x=>x.code===v);state.newPrice.code=v;state.newPrice.name=p?.name||"";}
function savePrice(i){const ep=state.editingPrice;state.prices[i]={...state.prices[i],name:ep.name,price:ep.price};state.editingPrice=null;saveAll();showToast("更新しました");render();}
function deletePrice(i){if(!confirm("削除しますか？"))return;state.prices.splice(i,1);saveAll();showToast("削除しました");render();}
function addPrice(){const np=state.newPrice;if(!np.customer||!np.code||!np.price){showToast("必須項目を入力してください","error");return;}const prod=state.products.find(p=>p.code===np.code);const name=np.name||prod?.name||np.code;state.prices.push({customer:np.customer,code:np.code,name,price:parseInt(np.price)});state.newPrice={customer:"",code:"",name:"",price:""};state.showAddPrice=false;saveAll();showToast("追加しました");render();}

// --- Settings Tab ---
function renderSettingsTab(){
  return`<h2 style="font-size:20px;font-weight:600;margin-bottom:20px;color:#1a1a2e">設定</h2>
  <div class="card"><h3>データバックアップ・共有</h3><p style="font-size:13px;color:#888;margin-bottom:16px">JSONファイルに書き出し・読み込みができます。3台のPCで共有する場合はこのファイルを共有フォルダに保存し、各PCでインポートしてください。</p>
  <div style="display:flex;gap:12px;flex-wrap:wrap"><button class="btn-primary" onclick="exportData()">バックアップを書き出す</button>
  <label style="background:#2d6a4f;color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600">データをインポートする<input type="file" accept=".json" onchange="importData(this)" style="display:none"></label></div></div>
  <div class="card"><h3>データ統計</h3><div class="grid4">
  <div class="stat-card"><div class="stat-label">客先数</div><div class="stat-val">${state.customers.length} 社</div></div>
  <div class="stat-card"><div class="stat-label">商品数</div><div class="stat-val">${state.products.length} 品目</div></div>
  <div class="stat-card"><div class="stat-label">単価設定</div><div class="stat-val">${state.prices.length} 件</div></div>
  <div class="stat-card"><div class="stat-label">発行履歴</div><div class="stat-val">${state.history.length} 件</div></div></div></div>
  <div class="card"><h3 style="color:#c62828">データ初期化</h3><p style="font-size:13px;color:#c62828;margin-bottom:12px">全データを初期状態に戻します。発行履歴も削除されます。</p><button class="btn-danger" style="padding:10px 24px;font-size:14px" onclick="resetAll()">初期化する</button></div>
  <div class="card"><h3>会社情報</h3><div style="font-size:13px;line-height:2;color:#444"><div><strong>${COMPANY.name}</strong>　${COMPANY.division}</div><div>${COMPANY.zip}　${COMPANY.address}</div><div>${COMPANY.tel}　${COMPANY.fax}</div></div></div>`;
}
function exportData(){const data={customers:state.customers,products:state.products,prices:state.prices,history:state.history,minG:state.minG,exportDate:new Date().toISOString()};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`pourvous_backup_${new Date().toLocaleDateString("ja")}.json`;a.click();showToast("バックアップを書き出しました");}
function importData(el){const file=el.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.customers)state.customers=d.customers;if(d.products)state.products=d.products;if(d.prices)state.prices=d.prices;if(d.history)state.history=d.history;if(d.minG)state.minG=d.minG;saveAll();showToast("インポートしました");render();}catch{showToast("読み込みに失敗しました","error");}};r.readAsText(file);}
function resetAll(){if(!confirm("全データを初期化しますか？この操作は取り消せません。"))return;state.customers=[...INIT_CUSTOMERS];state.products=[...INIT_PRODUCTS];state.prices=[...INIT_PRICES];state.history=[];state.minG={...INIT_MIN};saveAll();showToast("初期化しました");render();}

// --- Guide Tab ---
function renderGuideTab(){
  return`<h2 style="font-size:20px;font-weight:600;margin-bottom:20px;color:#1a1a2e">運用方法</h2>
  <div class="card"><h3 class="guide-h3">通常の運用フロー</h3>
  ${[["客先を選択","「伝票発行」タブを開き、客先をドロップダウンから選択します。納品日が自動で入ります。"],["数量を入力","客先ごとの品目が自動表示されます。数量を入力してください。合計金額が自動計算されます。"],["納品書を発行","「納品書を発行する」ボタンを押すと印刷プレビューが表示されます。伝票番号は自動採番されます。"],["印刷する","「印刷（B5横）」ボタンを押して印刷します。印刷設定でB5・横向きを選択してください。"],["伝票を切り分ける","中央の破線で半分に切ります。1枚をお客様へ渡し、控えを社内で保管してください。"]].map(([t,d],i)=>`<div class="guide-step"><div class="guide-num">${i+1}</div><div style="font-size:14px;line-height:1.7"><strong>${t}</strong>　${d}</div></div>`).join("")}</div>
  <div class="card"><h3 class="guide-h3">トラブル時の対処法</h3>
  <div style="margin-bottom:20px"><div style="font-size:15px;font-weight:600;color:#1a1a2e;margin-bottom:10px">印刷がうまくいかなかった場合</div>
  <div class="guide-step"><div class="guide-num">1</div><div style="font-size:14px;line-height:1.7"><span class="guide-badge">発行履歴</span>タブを開きます。</div></div>
  <div class="guide-step"><div class="guide-num">2</div><div style="font-size:14px;line-height:1.7">該当の伝票を探して「再印刷」ボタンを押します。同じ伝票番号でそのまま印刷できます。</div></div>
  <div class="guide-note">伝票番号は変わりません。そのまま再印刷してください。</div></div>
  <div><div style="font-size:15px;font-weight:600;color:#1a1a2e;margin-bottom:10px">数量を間違えた場合</div>
  <div class="guide-step"><div class="guide-num">1</div><div style="font-size:14px;line-height:1.7"><span class="guide-badge">発行履歴</span>タブを開きます。</div></div>
  <div class="guide-step"><div class="guide-num">2</div><div style="font-size:14px;line-height:1.7">該当の伝票の「再印刷」ボタンを押します。</div></div>
  <div class="guide-step"><div class="guide-num">3</div><div style="font-size:14px;line-height:1.7">印刷プレビュー画面で内容を確認して再印刷します。伝票番号はそのまま同じ番号を使ってください。</div></div>
  <div class="guide-note">伝票番号はそのまま同じ番号を使ってください。訂正版として扱います。</div></div></div>
  <div class="card"><h3 class="guide-h3">3台のPCでデータを共有する方法</h3>
  <p style="font-size:14px;color:#555;margin-bottom:16px;line-height:1.7">現在のシステムはPC個別にデータを保存しています。複数台で同じデータを使うには、定期的にバックアップを共有してください。</p>
  <div class="guide-step"><div class="guide-num">1</div><div style="font-size:14px;line-height:1.7"><span class="guide-badge">設定</span>タブを開き、「バックアップを書き出す」ボタンを押します。</div></div>
  <div class="guide-step"><div class="guide-num">2</div><div style="font-size:14px;line-height:1.7">ファイルを共有フォルダやUSBメモリで他のPCに渡します。</div></div>
  <div class="guide-step"><div class="guide-num">3</div><div style="font-size:14px;line-height:1.7">他のPCで<span class="guide-badge">設定</span>タブを開き「データをインポートする」で読み込みます。</div></div>
  <div class="guide-warn">インポートすると現在のデータが上書きされます。必ず最新のPCからバックアップを取ってから渡してください。</div></div>
  <div class="card"><h3 class="guide-h3">将来的な自動連動について</h3><p style="font-size:14px;color:#555;line-height:1.7">将来的にはクラウド（Firebase等）と連動することで、3台のPCが自動でリアルタイムに同期できるようになります。現在は手動バックアップで運用し、タイミングを見て自動連動化を検討してください。</p></div>`;
}

// --- Print Modal ---
function renderPrintModal(){
  const inv=state.printInvoice;if(!inv)return;
  const modal=document.getElementById("print-modal");
  modal.classList.remove("hidden");
  const displayItems=inv.items.filter(i=>parseFloat(i.qty)>0);
  const maxRows=14;const padded=[...displayItems];
  while(padded.length<maxRows)padded.push(null);
  const bdr="1px solid #000";
  function block(isCtrl){
    const rows=padded.map(item=>`<tr style="height:26px"><td style="border:${bdr};padding:2px 6px;font-size:13px">${item?item.name:"\u00a0"}</td><td style="border:${bdr};padding:2px 4px;text-align:center;font-size:13px;width:50px">${item?item.qty:""}</td><td style="border:${bdr};padding:2px 4px;text-align:right;font-size:13px;width:62px">${item?item.price.toLocaleString():""}</td><td style="border:${bdr};padding:2px 4px;text-align:right;font-size:13px;width:72px">${item?(parseInt(item.qty)*item.price).toLocaleString():""}</td></tr>`).join("");
    return`<div style="flex:1;padding:0 6px;font-family:'MS Mincho',serif;display:flex;flex-direction:column">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px"><div style="font-size:23px;font-weight:700">${isCtrl?"納品書 (控)":"納品書"}</div><div style="font-size:16px">№　${inv.invoiceNo}</div></div>
      <div style="border:${bdr};padding:8px 8px;margin-bottom:2px;font-size:17px;font-weight:700">${inv.customer}　様</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:2px;border:${bdr}">
        <div style="padding:4px 8px;min-width:90px;display:flex;flex-direction:column;justify-content:flex-end">
          <div style="font-size:12px;color:#333">納品日</div>
          <div style="font-size:14px;font-weight:700">${fmtDate(inv.deliveryDate)}</div>
        </div>
        <div style="padding:2px 6px;font-size:11px;line-height:1.3;text-align:left;width:150px;min-width:150px;white-space:nowrap;overflow:hidden;margin-left:-20px">
          <div style="font-weight:700;font-size:14px">${COMPANY.name}</div>
          <div style="font-weight:700;font-size:14px">${COMPANY.division}</div>
          <div>${COMPANY.zip}</div>
          <div>${COMPANY.address}</div>
          <div>${COMPANY.tel}</div>
          <div>${COMPANY.fax}</div>
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse;flex:1">
        <thead><tr>
          <th style="border:${bdr};padding:3px 6px;text-align:left;background:#f0f0f0;font-size:13px">品　名</th>
          <th style="border:${bdr};padding:3px 4px;width:50px;text-align:center;background:#f0f0f0;font-size:13px">数量</th>
          <th style="border:${bdr};padding:3px 4px;width:62px;text-align:right;background:#f0f0f0;font-size:13px">単　価</th>
          <th style="border:${bdr};padding:3px 4px;width:72px;text-align:right;background:#f0f0f0;font-size:13px">金　額</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="display:flex;justify-content:flex-end;border:${bdr};border-top:2px solid #000;margin-top:-1px">
        <div style="border-left:${bdr};padding:3px 8px;font-size:11px;display:flex;align-items:center">合　計</div>
        <div style="padding:3px 8px;font-size:15px;font-weight:700;min-width:80px;text-align:right">¥${inv.total.toLocaleString()}</div>
      </div>
      ${inv.minGuarantee>0&&inv.subtotal<inv.minGuarantee?`<div style="font-size:10px;color:#888;text-align:right;margin-top:2px">（最低保証金額 ¥${inv.minGuarantee.toLocaleString()} 適用）</div>`:""}
    </div>`;
  }
  modal.innerHTML=`<div style="background:#fff;border-radius:12px;padding:24px;max-width:920px;width:95%;max-height:90vh;overflow-y:auto">
    <div style="display:flex;gap:12px;justify-content:flex-end;margin-bottom:16px">
      <button class="btn-cancel" style="padding:10px 20px;font-size:15px" onclick="closePrint()">閉じる</button>
      <button class="btn-primary" style="padding:10px 28px;font-size:15px" onclick="window.print()">印刷（B5横）</button>
    </div>
    <div id="print-area" style="display:flex;gap:0;background:#fff;width:100%;box-sizing:border-box">
      ${block(false)}
      <div style="width:16px;min-width:16px;display:flex;align-items:center;justify-content:center"><div style="border-left:1px dashed #aaa;height:100%"></div></div>
      ${block(true)}
    </div>
    <div style="margin-top:12px;font-size:12px;color:#888;text-align:center">※ 印刷設定：B5サイズ・横向きを選択してください</div>
  </div>`;
}
function closePrint(){state.showPrint=false;state.printInvoice=null;document.getElementById("print-modal").classList.add("hidden");document.getElementById("print-modal").innerHTML="";}

function bindEvents(){
  document.getElementById("print-modal").onclick=e=>{if(e.target===document.getElementById("print-modal"))closePrint();};
}

render();
</script>
</body>
</html>
