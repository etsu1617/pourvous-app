<title>プゥル・ヴー在庫管理</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.app{max-width:700px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;border-bottom:1px solid #e0ddd5;background:#fff;position:sticky;top:0;z-index:20}
.header h1{font-size:15px;font-weight:600;color:#1a1a1a}
.header-btns{display:flex;gap:5px;align-items:center}
.hbtn{background:#fff;border:1px solid #ddd;border-radius:9px;padding:5px 9px;font-size:11px;cursor:pointer;color:#1a1a1a;font-family:inherit;white-space:nowrap}
.hbtn:active{background:#f0ede6}
.hbtn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.hbtn.primary:active{opacity:0.8}
.sync-btn{background:none;border:none;font-size:17px;cursor:pointer;padding:3px;line-height:1}
.sync-btn.spinning{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.nav-bar{display:flex;border-bottom:1px solid #e0ddd5;background:#fff;position:sticky;top:53px;z-index:19}
.nav-tab{flex:1;padding:9px 4px;font-size:12px;cursor:pointer;color:#888;border:none;border-bottom:2px solid transparent;background:none;font-family:inherit;text-align:center}
.nav-tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:600}
.tab-bar{display:flex;overflow-x:auto;background:#f7f6f2;padding:6px 0.75rem;gap:6px}
.tab-bar::-webkit-scrollbar{display:none}
.gtab{padding:5px 12px;font-size:12px;cursor:pointer;color:#888;border:1px solid #ddd;border-radius:999px;white-space:nowrap;background:#fff;font-family:inherit}
.gtab.active{color:#fff;background:#1a1a1a;border-color:#1a1a1a;font-weight:600}
.body{padding:0.75rem;flex:1}
.page{display:none}.page.active{display:block}
.search-wrap{position:relative;margin-bottom:0.75rem}
.search-input{width:100%;padding:8px 12px 8px 34px;border:1px solid #ddd;border-radius:10px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:#aaa}
.alert-banner{background:#fff8ec;border:1px solid #f5c842;border-radius:10px;padding:8px 12px;margin-bottom:0.75rem;display:none}
.alert-banner.show{display:block}
.alert-title{font-size:12px;font-weight:600;color:#7a4f00;margin-bottom:3px}
.alert-banner ul{list-style:none}
.alert-banner li{font-size:12px;color:#a06800;padding:1px 0}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:0.75rem}
.stat{background:#fff;border-radius:10px;padding:7px 8px;text-align:center;border:1px solid #e8e6e0}
.stat-label{font-size:11px;color:#888;margin-bottom:2px}
.stat-value{font-size:18px;font-weight:600;color:#1a1a1a}
.items{display:flex;flex-direction:column;gap:6px}
.item-card{background:#fff;border:1px solid #e8e6e0;border-radius:13px;padding:8px 11px;transition:border-color 0.15s}
.item-card.alert-active{border-color:#f5a623}
.item-card.editing{border-color:#4a90d9}
.item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.item-name-area{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.item-name{font-size:13px;font-weight:600;color:#1a1a1a}
.item-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:none;border:1px solid #e0ddd5;cursor:pointer;padding:4px 7px;border-radius:7px;color:#666;font-size:11px;line-height:1;font-family:inherit}
.icon-btn:active{background:#f0ede6}
.icon-btn.danger:active{background:#ffeaea;color:#c0392b}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.metric{background:#f7f6f2;border-radius:8px;padding:6px 7px}
.metric-label{font-size:10px;color:#888;margin-bottom:3px}
.metric-row{display:flex;align-items:center;gap:2px}
.metric-val{font-size:16px;font-weight:600;color:#1a1a1a}
.num-input{width:36px;font-size:12px;font-weight:600;border:1px solid #ddd;border-radius:6px;padding:1px 2px;background:#fff;color:#1a1a1a;text-align:center;font-family:inherit}
.step-btn{background:#fff;border:1px solid #ddd;border-radius:6px;width:20px;height:20px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:#333;flex-shrink:0;font-family:inherit}
.step-btn:active{background:#f0ede6}
.stock-badge{font-size:10px;padding:1px 6px;border-radius:999px;display:inline-block;font-weight:500}
.s-ok{background:#e6f5ec;color:#1e7e3a}
.s-low{background:#fff3cd;color:#856404}
.s-zero{background:#fde8e8;color:#b91c1c}
.edit-row{display:none;margin-top:8px;padding-top:8px;border-top:1px solid #eee;flex-direction:column;gap:8px}
.edit-row.open{display:flex}
.edit-label{font-size:11px;color:#888;font-weight:600;margin-bottom:4px}
.edit-fields{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end}
.ef{display:flex;flex-direction:column;gap:2px}
.ef label{font-size:10px;color:#888}
.ef input,.ef select{border:1px solid #ddd;border-radius:8px;padding:5px 8px;font-size:13px;background:#f7f6f2;color:#1a1a1a;font-family:inherit;width:120px}
.alert-row{background:#f7f6f2;border-radius:9px;padding:7px 10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.toggle-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:#1a1a1a;user-select:none}
.track{width:36px;height:20px;border-radius:999px;background:#ccc;position:relative;transition:background 0.2s;flex-shrink:0}
.track.on{background:#34c759}
.thumb{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left 0.15s;box-shadow:0 1px 2px rgba(0,0,0,0.2)}
.track.on .thumb{left:18px}
.thr-wrap{display:flex;align-items:center;gap:4px;font-size:12px;color:#555}
.thr-input{width:50px;border:1px solid #ddd;border-radius:7px;padding:3px 5px;font-size:12px;background:#fff;color:#1a1a1a;text-align:center;font-family:inherit}
.save-btn{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:6px 13px;font-size:12px;cursor:pointer;margin-left:auto;font-family:inherit;font-weight:600}
.save-btn:active{opacity:0.8}
.empty{text-align:center;padding:2.5rem 1rem;color:#aaa;font-size:13px;line-height:1.7}
.loading{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.graph-controls{display:flex;gap:6px;margin-bottom:0.75rem;flex-wrap:wrap}
.graph-select{border:1px solid #ddd;border-radius:8px;padding:5px 8px;font-size:12px;background:#fff;color:#1a1a1a;font-family:inherit}
.chart-card{background:#fff;border:1px solid #e8e6e0;border-radius:13px;padding:12px;margin-bottom:0.75rem}
.chart-title{font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:8px}
.chart-wrap{position:relative;height:200px}
.history-filter{display:flex;gap:6px;margin-bottom:0.75rem;flex-wrap:wrap}
.hist-row{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:8px 11px;display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.hist-left{display:flex;flex-direction:column;gap:2px}
.hist-name{font-size:13px;font-weight:600;color:#1a1a1a}
.hist-meta{font-size:11px;color:#888}
.hist-badge{font-size:12px;font-weight:600;padding:3px 8px;border-radius:999px}
.hist-in{background:#e6f5ec;color:#1e7e3a}
.hist-out{background:#fde8e8;color:#b91c1c}
.hist-edit{background:#e8f0fb;color:#1a56a0}
.setting-card{background:#fff;border:1px solid #e8e6e0;border-radius:13px;padding:12px 14px;margin-bottom:10px}
.setting-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:8px}
.full-btn{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;margin-top:6px}
.full-btn:active{opacity:0.8}
.full-btn.danger{background:#c0392b}
.full-btn.success{background:#1e7e3a}
.toast{position:fixed;bottom:calc(1.5rem + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:8px 18px;border-radius:999px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:1.25rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));width:100%;max-width:700px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1rem;text-align:center}
.fg{margin-bottom:11px}
.fg label{font-size:12px;color:#888;display:block;margin-bottom:4px}
.fg input,.fg select{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:11px;font-size:15px;background:#f7f6f2;color:#1a1a1a;font-family:inherit}
.modal-btns{display:flex;gap:8px;margin-top:1rem}
.mbtn{flex:1;border-radius:12px;padding:12px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600}
.mbtn.cancel{background:#f0ede6;border:none;color:#555}
.mbtn.ok{background:#1a1a1a;color:#fff;border:none}
.mbtn.ok:active{opacity:0.8}
.genre-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#f7f6f2;border-radius:9px;margin-top:6px}
.genre-item span{font-size:13px;color:#1a1a1a}
.genre-del{background:none;border:none;color:#c0392b;font-size:13px;cursor:pointer;padding:2px 6px;border-radius:5px;font-family:inherit}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>プゥル・ヴー在庫管理</h1>
    <div class="header-btns">
      <button class="sync-btn" id="sync-btn" onclick="loadAll()">↻</button>
      <button class="hbtn" onclick="openGenreModal()">ジャンル</button>
      <button class="hbtn primary" onclick="openItemModal()">＋ 追加</button>
    </div>
  </div>
  <div class="nav-bar">
    <button class="nav-tab active" onclick="showPage('inventory',this)">在庫</button>
    <button class="nav-tab" onclick="showPage('graph',this)">グラフ</button>
    <button class="nav-tab" onclick="showPage('history',this)">履歴</button>
    <button class="nav-tab" onclick="showPage('settings',this)">設定</button>
  </div>
  <div id="page-inventory" class="page active">
    <div class="tab-bar" id="tab-bar"></div>
    <div class="body">
      <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" type="text" id="search-input" placeholder="品目名で検索..." oninput="renderItems()"></div>
      <div class="alert-banner" id="alert-banner"><div class="alert-title">⚠ 在庫アラート</div><ul id="alert-list"></ul></div>
      <div class="summary">
        <div class="stat"><div class="stat-label">品目数</div><div class="stat-value" id="total-items">—</div></div>
        <div class="stat"><div class="stat-label">総在庫</div><div class="stat-value" id="total-stock">—</div></div>
        <div class="stat"><div class="stat-label">在庫切れ</div><div class="stat-value" id="zero-items" style="color:#b91c1c">—</div></div>
      </div>
      <div class="items" id="items-list"><div class="loading">読み込み中...</div></div>
    </div>
  </div>
  <div id="page-graph" class="page">
    <div class="body">
      <div class="graph-controls">
        <select class="graph-select" id="graph-item-select" onchange="renderGraphs()"><option value="">品目を選択</option></select>
        <select class="graph-select" id="graph-range" onchange="renderGraphs()">
          <option value="7">直近7日</option><option value="14">直近14日</option><option value="30" selected>直近30日</option>
        </select>
      </div>
      <div class="chart-card"><div class="chart-title">在庫数の推移</div><div class="chart-wrap"><canvas id="stock-chart"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">入荷・出庫の推移</div><div class="chart-wrap"><canvas id="inout-chart"></canvas></div></div>
      <div id="graph-empty" class="empty">品目を選択するとグラフが表示されます</div>
    </div>
  </div>
  <div id="page-history" class="page">
    <div class="body">
      <div class="history-filter">
        <select class="graph-select" id="hist-genre-filter" onchange="renderHistory()"><option value="">すべてのジャンル</option></select>
        <select class="graph-select" id="hist-type-filter" onchange="renderHistory()">
          <option value="">すべての操作</option><option value="入荷">入荷</option><option value="出庫">出庫</option><option value="編集">編集</option>
        </select>
      </div>
      <div id="history-list"><div class="loading">読み込み中...</div></div>
    </div>
  </div>
  <div id="page-settings" class="page">
    <div class="body">
      <div class="setting-card">
        <div class="setting-title">LINE通知設定</div>
        <input type="text" id="line-token-input" placeholder="LINE Notifyトークンをここに貼り付け" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:9px;font-size:13px;background:#f7f6f2;color:#1a1a1a;font-family:inherit;margin-top:4px">
        <button class="full-btn success" onclick="saveLineToken()">トークンを保存</button>
        <button class="full-btn" onclick="testLineNotify()" style="background:#4a90d9;margin-top:6px">テスト通知を送る</button>
        <div style="font-size:11px;color:#aaa;margin-top:8px;line-height:1.6">notify.line.me で無料取得できます。アラート発動時にLINEへ自動通知されます。</div>
      </div>
      <div class="setting-card">
        <div class="setting-title">データ管理</div>
        <button class="full-btn" onclick="exportCSV()">CSVでエクスポート</button>
        <button class="full-btn danger" onclick="clearHistory()" style="margin-top:6px">履歴をすべて削除</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="item-modal">
  <div class="modal">
    <h2>品目を追加</h2>
    <div class="fg"><label>品目名</label><input type="text" id="new-name" placeholder="例：りんご"></div>
    <div class="fg"><label>ジャンル</label><select id="new-genre"></select></div>
    <div class="fg"><label>初期在庫数</label><input type="number" id="new-stock" value="0" min="0"></div>
    <div class="fg"><label>単価（円）</label><input type="number" id="new-price" value="0" min="0"></div>
    <div class="fg"><label>単位</label><input type="text" id="new-unit" placeholder="例：個・本・袋・箱" value="個"></div>
    <div class="fg"><label>メモ・備考</label><textarea id="new-memo" placeholder="メモを入力..." rows="2" style="width:100%;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:14px;resize:none;box-sizing:border-box;"></textarea></div>
    <div class="modal-btns"><button class="mbtn cancel" onclick="closeItemModal()">キャンセル</button><button class="mbtn ok" onclick="addItem()">追加</button></div>
  </div>
</div>
<div class="modal-bg" id="genre-modal">
  <div class="modal">
    <h2>ジャンル管理</h2>
    <div class="fg"><label>新しいジャンル名</label><input type="text" id="new-genre-name" placeholder="例：野菜"></div>
    <div class="modal-btns"><button class="mbtn cancel" onclick="closeGenreModal()">閉じる</button><button class="mbtn ok" onclick="addGenre()">追加</button></div>
    <div id="genre-list"></div>
  </div>
</div>
<script>
const SUPABASE_URL='https://xkonhzdahwbjqlaaauzm.supabase.co';
const SUPABASE_KEY='sb_publishable_1AnhQG4FZji6B4dBbmK39Q_jrPHuzmW';
const LINE_TOKEN_KEY='puruvuu_line_token';

async function api(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,opts);
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const t=await res.text();return t?JSON.parse(t):null;
}

let genres=['すべて'],items=[],history=[],currentGenre='すべて';
let stockChart=null,inoutChart=null;

function showPage(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='graph'){populateGraphSelect();renderGraphs();}
  if(name==='history'){populateHistFilter();renderHistory();}
  if(name==='settings'){loadSettingsUI();}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function setSyncing(on){document.getElementById('sync-btn').classList.toggle('spinning',on);}

async function loadAll(){
  setSyncing(true);
  try{
    const hasHist=await checkHistoryTable();
    const promises=[api('genres?order=sort_order'),api('items?order=id')];
    if(hasHist)promises.push(api('history?order=operated_at.desc&limit=300'));
    const results=await Promise.all(promises);
    genres=['すべて',...results[0].map(g=>g.name)];
    items=results[1];
    history=results[2]||[];
    renderTabs();renderItems();
    showToast('データを更新しました');
  }catch(e){showToast('通信エラー：'+e.message);}
  setSyncing(false);
}

async function checkHistoryTable(){try{await api('history?limit=1');return true;}catch(e){return false;}}

function isAl(i){return i.alert_on&&i.stock<=i.threshold;}
function badge(s){
  if(s===0)return '<span class="stock-badge s-zero">在庫切れ</span>';
  if(s<=10)return '<span class="stock-badge s-low">残りわずか</span>';
  return '<span class="stock-badge s-ok">在庫あり</span>';
}

function vis(){
  const q=(document.getElementById('search-input')?.value||'').trim().toLowerCase();
  let list=currentGenre==='すべて'?items:items.filter(i=>i.genre===currentGenre);
  if(q)list=list.filter(i=>i.name.toLowerCase().includes(q));
  return list;
}

function renderTabs(){
  document.getElementById('tab-bar').innerHTML=genres.map(g=>`<button class="gtab${g===currentGenre?' active':''}" onclick="setGenre('${g}')">${g}</button>`).join('');
}
function setGenre(g){currentGenre=g;renderTabs();renderItems();}

function updateSummary(){
  const list=vis();
  document.getElementById('total-items').textContent=list.length;
  document.getElementById('total-stock').textContent=list.reduce((a,i)=>a+i.stock,0);
  document.getElementById('zero-items').textContent=list.filter(i=>i.stock===0).length;
}

function updateAlerts(){
  const al=items.filter(isAl);
  const b=document.getElementById('alert-banner');
  if(!al.length){b.classList.remove('show');return;}
  b.classList.add('show');
  document.getElementById('alert-list').innerHTML=al.map(i=>`<li>・ ${i.name}（${i.genre}）：${i.stock}個 / 設定${i.threshold}個以下</li>`).join('');
  sendLineAlerts(al);
}

async function sendLineAlerts(al){
  const token=localStorage.getItem(LINE_TOKEN_KEY);
  if(!token)return;
  const msg=al.map(i=>`⚠ ${i.name}（${i.genre}）：在庫${i.stock}個（設定：${i.threshold}個以下）`).join('\n');
  try{await fetch('https://notify-api.line.me/api/notify',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/x-www-form-urlencoded'},body:'message='+encodeURIComponent('\nプゥル・ヴー在庫アラート\n'+msg)});}catch(e){}
}

function renderItems(){
  updateSummary();updateAlerts();
  const list=vis();const el=document.getElementById('items-list');
  if(!list.length){el.innerHTML='<div class="empty">品目がありません</div>';return;}
  el.innerHTML=list.map(item=>`
    <div class="item-card${isAl(item)?' alert-active':''}" id="card-${item.id}">
      <div class="item-top">
        <div class="item-name-area"><span class="item-name">${item.name}</span>${isAl(item)?'<span style="font-size:11px">⚠</span>':''}${badge(item.stock)}</div>
        <div class="item-actions"><button class="icon-btn" onclick="toggleEdit(${item.id})">✎</button><button class="icon-btn danger" onclick="delItem(${item.id})">✕</button></div>
      </div>
      <div class="metrics">
        <div class="metric"><div class="metric-label">在庫数</div><span class="metric-val" id="sv-${item.id}">${item.stock}</span></div>
        <div class="metric"><div class="metric-label">入荷数</div><div class="metric-row"><button class="step-btn" onclick="chgR(${item.id},-1)">−</button><input class="num-input" type="number" id="r-${item.id}" value="${item.receipt}" min="0" onchange="setR(${item.id},this.value)" style="color:#1e7e3a"><button class="step-btn" onclick="chgR(${item.id},1)">＋</button></div></div>
        <div class="metric"><div class="metric-label">出庫数</div><div class="metric-row"><button class="step-btn" onclick="chgI(${item.id},-1)">−</button><input class="num-input" type="number" id="i-${item.id}" value="${item.issue}" min="0" onchange="setI(${item.id},this.value)" style="color:#b91c1c"><button class="step-btn" onclick="chgI(${item.id},1)">＋</button></div></div>
      </div>
      <div class="edit-row" id="er-${item.id}">
        <div><div class="edit-label">基本情報</div><div class="edit-fields">
          <div class="ef"><label>品目名</label><input type="text" id="ne-${item.id}" value="${item.name}"></div>
          <div class="ef"><label>ジャンル</label><select id="ge-${item.id}">${genres.filter(g=>g!=='すべて').map(g=>`<option${g===item.genre?' selected':''}>${g}</option>`).join('')}</select></div>
          <div class="ef"><label>在庫（直接修正）</label><input type="number" id="se-${item.id}" value="${item.stock}" min="0" style="width:90px"></div>
        </div></div>
        <div><div class="edit-label">アラート設定</div><div class="alert-row">
          <div class="toggle-wrap" onclick="togAlert(${item.id})"><div class="track${item.alert_on?' on':''}" id="tr-${item.id}"><div class="thumb"></div></div><span id="tl-${item.id}">${item.alert_on?'ON':'OFF'}</span></div>
          <div class="thr-wrap" id="tw-${item.id}" style="${item.alert_on?'':'opacity:0.4;pointer-events:none'}"><span>在庫</span><input class="thr-input" type="number" id="th-${item.id}" value="${item.threshold}" min="0"><span>個以下でお知らせ</span></div>
          <div class="ef"><label>単価（円）</label><input type="number" id="pe-${item.id}" value="${item.price||0}" min="0" style="width:90px"></div>
          <div class="ef"><label>単位</label><input type="text" id="ue-${item.id}" value="${item.unit||'個'}" style="width:80px"></div>
          <div class="ef"><label>メモ・備考</label><textarea id="me-${item.id}" rows="2" style="width:100%;border:1px solid #ddd;border-radius:6px;padding:6px;font-size:13px;resize:none;box-sizing:border-box;">${item.memo||''}</textarea></div>
          <button class="save-btn" onclick="saveEdit(${item.id})">保存</button>
        </div></div>
      </div>
    </div>`).join('');
}

function toggleEdit(id){const r=document.getElementById(`er-${id}`);const c=document.getElementById(`card-${id}`);const o=r.classList.contains('open');r.classList.toggle('open',!o);c.classList.toggle('editing',!o);}

async function togAlert(id){
  const item=items.find(i=>i.id===id);const nv=!item.alert_on;item.alert_on=nv;
  document.getElementById(`tr-${id}`).classList.toggle('on',nv);
  document.getElementById(`tl-${id}`).textContent=nv?'ON':'OFF';
  const tw=document.getElementById(`tw-${id}`);tw.style.opacity=nv?'1':'0.4';tw.style.pointerEvents=nv?'auto':'none';
  document.getElementById(`card-${id}`).classList.toggle('alert-active',isAl(item));updateAlerts();
  try{await api(`items?id=eq.${id}`,'PATCH',{alert_on:nv});}catch(e){showToast('保存エラー');}
}

async function saveEdit(id){
  const item=items.find(i=>i.id===id);
  const n=document.getElementById(`ne-${id}`).value.trim();
  const g=document.getElementById(`ge-${id}`).value;
  const s=parseInt(document.getElementById(`se-${id}`).value)||0;
  const t=parseInt(document.getElementById(`th-${id}`).value)||0;
  if(!n)return;
  const p=parseInt(document.getElementById(`pe-${id}`).value)||0;const u=document.getElementById(`ue-${id}`).value||'個';const m=document.getElementById(`me-${id}`).value||'';const patch={name:n,genre:g,stock:Math.max(0,s),threshold:Math.max(0,t),receipt:0,issue:0,price:p,unit:u,memo:m};
  try{
    await api(`items?id=eq.${id}`,'PATCH',patch);
    const diff=Math.max(0,s)-item.stock;
    if(diff!==0)await addHistory(item.id,item.name,g,'編集',diff,Math.max(0,s));
    Object.assign(item,patch);showToast('保存しました');renderItems();
  }catch(e){showToast('保存エラー：'+e.message);}
}

async function delItem(id){
  if(!confirm('この品目を削除しますか？'))return;
  try{await api(`items?id=eq.${id}`,'DELETE');items=items.filter(i=>i.id!==id);showToast('削除しました');renderItems();}
  catch(e){showToast('削除エラー');}
}

async function addHistory(itemId,itemName,genre,changeType,changeAmount,stockAfter){
  try{const row=await api('history','POST',{item_id:itemId,item_name:itemName,genre,change_type:changeType,change_amount:changeAmount,stock_after:stockAfter});if(row)history.unshift(row[0]);}catch(e){}
}

async function syncItem(id,patch,histType,histAmount){
  const item=items.find(i=>i.id===id);Object.assign(item,patch);
  const sv=document.getElementById(`sv-${id}`);const rv=document.getElementById(`r-${id}`);const iv=document.getElementById(`i-${id}`);
  if(sv)sv.textContent=item.stock;if(rv)rv.value=item.receipt;if(iv)iv.value=item.issue;
  document.getElementById(`card-${id}`)?.classList.toggle('alert-active',isAl(item));
  updateSummary();updateAlerts();
  try{
    await api(`items?id=eq.${id}`,'PATCH',patch);
    if(histType&&histAmount!==0)await addHistory(id,item.name,item.genre,histType,Math.abs(histAmount),item.stock);
  }catch(e){showToast('通信エラー');}
}

function chgR(id,d){const i=items.find(x=>x.id===id);if(d<0&&i.receipt===0)return;const nr=Math.max(0,i.receipt+d);syncItem(id,{receipt:nr,stock:Math.max(0,i.stock+d)},'入荷',d);}
function setR(id,v){const i=items.find(x=>x.id===id);const nv=Math.max(0,parseInt(v)||0);const diff=nv-i.receipt;syncItem(id,{receipt:nv,stock:Math.max(0,i.stock+diff)},'入荷',diff);}
function chgI(id,d){const i=items.find(x=>x.id===id);if(d<0&&i.issue===0)return;const ni=Math.max(0,i.issue+d);syncItem(id,{issue:ni,stock:Math.max(0,i.stock-(ni-i.issue))},'出庫',d);}
function setI(id,v){const i=items.find(x=>x.id===id);const nv=Math.max(0,parseInt(v)||0);const diff=nv-i.issue;syncItem(id,{issue:nv,stock:Math.max(0,i.stock-diff)},'出庫',diff);}

function populateGraphSelect(){
  const sel=document.getElementById('graph-item-select');const cur=sel.value;
  sel.innerHTML='<option value="">品目を選択</option>'+items.map(i=>`<option value="${i.id}">${i.name}</option>`).join('');
  if(cur)sel.value=cur;
}

function renderGraphs(){
  const itemId=parseInt(document.getElementById('graph-item-select').value);
  const days=parseInt(document.getElementById('graph-range').value);
  const empty=document.getElementById('graph-empty');
  if(!itemId){empty.style.display='block';if(stockChart){stockChart.destroy();stockChart=null;}if(inoutChart){inoutChart.destroy();inoutChart=null;}return;}
  empty.style.display='none';
  const item=items.find(i=>i.id===itemId);
  const now=new Date();
  const labels=[];
  for(let d=days-1;d>=0;d--){const dt=new Date(now);dt.setDate(dt.getDate()-d);labels.push(`${dt.getMonth()+1}/${dt.getDate()}`);}
  const stockByDay={};const inByDay={};const outByDay={};
  labels.forEach(l=>{stockByDay[l]=null;inByDay[l]=0;outByDay[l]=0;});
  history.filter(h=>h.item_id===itemId).forEach(h=>{
    const dt=new Date(h.operated_at);const lbl=`${dt.getMonth()+1}/${dt.getDate()}`;
    if(lbl in stockByDay){stockByDay[lbl]=h.stock_after;if(h.change_type==='入荷')inByDay[lbl]+=Math.abs(h.change_amount);if(h.change_type==='出庫')outByDay[lbl]+=Math.abs(h.change_amount);}
  });
  const stockData=labels.map(l=>stockByDay[l]!==null?stockByDay[l]:item.stock);
  if(stockChart)stockChart.destroy();
  stockChart=new Chart(document.getElementById('stock-chart').getContext('2d'),{type:'line',data:{labels,datasets:[{label:'在庫数',data:stockData,borderColor:'#1a1a1a',backgroundColor:'rgba(26,26,26,0.07)',tension:0.3,fill:true,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#f0ede6'}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
  if(inoutChart)inoutChart.destroy();
  inoutChart=new Chart(document.getElementById('inout-chart').getContext('2d'),{type:'bar',data:{labels,datasets:[{label:'入荷',data:labels.map(l=>inByDay[l]),backgroundColor:'rgba(30,126,58,0.7)'},{label:'出庫',data:labels.map(l=>outByDay[l]),backgroundColor:'rgba(185,28,28,0.7)'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:12}}},scales:{y:{beginAtZero:true,grid:{color:'#f0ede6'}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
}

function populateHistFilter(){
  document.getElementById('hist-genre-filter').innerHTML='<option value="">すべてのジャンル</option>'+genres.filter(g=>g!=='すべて').map(g=>`<option>${g}</option>`).join('');
}

function renderHistory(){
  const genre=document.getElementById('hist-genre-filter').value;
  const type=document.getElementById('hist-type-filter').value;
  let list=history;if(genre)list=list.filter(h=>h.genre===genre);if(type)list=list.filter(h=>h.change_type===type);
  const el=document.getElementById('history-list');
  if(!list.length){el.innerHTML='<div class="empty">履歴がありません<br>Supabaseでhistoryテーブルを作成すると記録されます</div>';return;}
  el.innerHTML=list.map(h=>{
    const dt=new Date(h.operated_at);const dateStr=`${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`;
    const cls=h.change_type==='入荷'?'hist-in':h.change_type==='出庫'?'hist-out':'hist-edit';
    const sign=h.change_type==='入荷'?'+':h.change_type==='出庫'?'-':'±';
    return `<div class="hist-row"><div class="hist-left"><span class="hist-name">${h.item_name}</span><span class="hist-meta">${h.genre} · ${dateStr} · 在庫→${h.stock_after}個</span></div><span class="hist-badge ${cls}">${h.change_type} ${sign}${Math.abs(h.change_amount)}</span></div>`;
  }).join('');
}

function loadSettingsUI(){document.getElementById('line-token-input').value=localStorage.getItem(LINE_TOKEN_KEY)||'';}
function saveLineToken(){const t=document.getElementById('line-token-input').value.trim();if(!t){showToast('トークンを入力してください');return;}localStorage.setItem(LINE_TOKEN_KEY,t);showToast('トークンを保存しました');}
async function testLineNotify(){
  const token=localStorage.getItem(LINE_TOKEN_KEY);if(!token){showToast('先にトークンを保存してください');return;}
  try{await fetch('https://notify-api.line.me/api/notify',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/x-www-form-urlencoded'},body:'message='+encodeURIComponent('\nプゥル・ヴー在庫管理\nテスト通知です！正常に接続されています。')});showToast('LINE通知を送りました');}
  catch(e){showToast('送信エラー');}
}

function exportCSV(){
  const csv='\uFEFF品目名,ジャンル,在庫数,入荷数,出庫数,アラートON,アラート閾値\n'+items.map(i=>`${i.name},${i.genre},${i.stock},${i.receipt},${i.issue},${i.alert_on?'はい':'いいえ'},${i.threshold}`).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='在庫データ.csv';a.click();showToast('CSVをダウンロードしました');
}

async function clearHistory(){
  if(!confirm('履歴をすべて削除しますか？'))return;
  try{await api('history','DELETE');history=[];showToast('削除しました');renderHistory();}catch(e){showToast('削除エラー');}
}

function populateSelect(){document.getElementById('new-genre').innerHTML=genres.filter(g=>g!=='すべて').map(g=>`<option>${g}</option>`).join('');}
function openItemModal(){populateSelect();document.getElementById('new-name').value='';document.getElementById('new-stock').value='0';document.getElementById('new-price').value='0';document.getElementById('new-unit').value='個';document.getElementById('new-memo').value='';document.getElementById('item-modal').classList.add('open');setTimeout(()=>document.getElementById('new-name').focus(),150);}
function closeItemModal(){document.getElementById('item-modal').classList.remove('open');}

async function addItem(){
  const name=document.getElementById('new-name').value.trim();const genre=document.getElementById('new-genre').value;const stock=parseInt(document.getElementById('new-stock').value)||0;
  if(!name||!genre)return;
  try{
    const rows=await api('items','POST',{name,genre,stock,receipt:0,issue:0,alert_on:true,threshold:10,price:parseInt(document.getElementById('new-price').value)||0,unit:document.getElementById('new-unit').value||'個',memo:document.getElementById('new-memo').value||''});
    items.push(rows[0]);currentGenre=genre;
    if(stock>0)await addHistory(rows[0].id,name,genre,'入荷',stock,stock);
    closeItemModal();showToast('追加しました');renderTabs();renderItems();
  }catch(e){showToast('追加エラー：'+e.message);}
}

function renderGenreList(){
  const el=document.getElementById('genre-list');const ug=genres.filter(g=>g!=='すべて');
  if(!ug.length){el.innerHTML='<div style="font-size:12px;color:#aaa;padding:8px 0">ジャンルがありません</div>';return;}
  el.innerHTML=ug.map(g=>`<div class="genre-item"><span>${g}</span><button class="genre-del" onclick="delGenre('${g}')">削除</button></div>`).join('');
}
function openGenreModal(){renderGenreList();document.getElementById('new-genre-name').value='';document.getElementById('genre-modal').classList.add('open');}
function closeGenreModal(){document.getElementById('genre-modal').classList.remove('open');renderTabs();renderItems();}

async function addGenre(){
  const n=document.getElementById('new-genre-name').value.trim();if(!n||genres.includes(n))return;
  try{await api('genres','POST',{name:n,sort_order:genres.length});genres.push(n);document.getElementById('new-genre-name').value='';showToast('ジャンルを追加しました');renderGenreList();}
  catch(e){showToast('追加エラー：'+e.message);}
}

async function delGenre(g){
  if(items.some(i=>i.genre===g)){alert(`「${g}」に品目があるため削除できません。\n先に品目を別のジャンルへ移動してください。`);return;}
  try{await api(`genres?name=eq.${encodeURIComponent(g)}`,'DELETE');genres=genres.filter(x=>x!==g);if(currentGenre===g)currentGenre='すべて';showToast('削除しました');renderGenreList();}
  catch(e){showToast('削除エラー');}
}

document.getElementById('item-modal').addEventListener('click',function(e){if(e.target===this)closeItemModal();});
document.getElementById('genre-modal').addEventListener('click',function(e){if(e.target===this)closeGenreModal();});
loadAll();
</script>
</body>
</html>
