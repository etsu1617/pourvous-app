<title>プゥル・ヴー在庫管理</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:150%}body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.app{max-width:700px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;border-bottom:1px solid #e0ddd5;background:#fff;position:sticky;top:0;z-index:20}
.header h1{font-size:20px;font-weight:600;color:#1a1a1a}
.header-btns{display:flex;gap:6px;align-items:center}
.hbtn{background:#fff;border:1px solid #ddd;border-radius:9px;padding:7px 12px;font-size:15px;cursor:pointer;color:#1a1a1a;font-family:inherit;white-space:nowrap}
.hbtn:active{background:#f0ede6}
.hbtn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.hbtn.primary:active{opacity:0.8}
.sync-btn{background:none;border:none;font-size:17px;cursor:pointer;padding:3px;line-height:1}
.sync-btn.spinning{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.tab-bar{display:flex;overflow-x:auto;background:#f7f6f2;padding:6px 0.75rem;gap:6px;border-bottom:1px solid #e0ddd5;position:sticky;top:53px;z-index:19}
.tab-bar::-webkit-scrollbar{display:none}
.gtab{padding:7px 18px;font-size:15px;cursor:pointer;color:#888;border:1px solid #ddd;border-radius:999px;white-space:nowrap;background:#fff;font-family:inherit}
.gtab.active{color:#fff;background:#1a1a1a;border-color:#1a1a1a;font-weight:600}
.body{padding:0.75rem;flex:1}
.search-wrap{position:relative;margin-bottom:0.75rem}
.search-input{width:100%;padding:11px 12px 11px 38px;border:1px solid #ddd;border-radius:11px;font-size:16px;background:#fff;color:#1a1a1a;font-family:inherit}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:#aaa}
.alert-banner{background:#fff8ec;border:1px solid #f5c842;border-radius:10px;padding:8px 12px;margin-bottom:0.75rem;display:none}
.alert-banner.show{display:block}
.alert-title{font-size:14px;font-weight:600;color:#7a4f00;margin-bottom:3px}
.alert-banner ul{list-style:none}
.alert-banner li{font-size:14px;color:#a06800;padding:1px 0}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:0.75rem}
.stat{background:#fff;border-radius:10px;padding:7px 8px;text-align:center;border:1px solid #e8e6e0}
.stat-label{font-size:13px;color:#888;margin-bottom:2px}
.stat-value{font-size:22px;font-weight:600;color:#1a1a1a}
.items{display:flex;flex-direction:column;gap:6px}
.item-card{background:#fff;border:1px solid #e8e6e0;border-radius:13px;padding:9px 12px;transition:border-color 0.15s}
.item-card.alert-active{border-color:#f5a623}
.item-card.editing{border-color:#4a90d9}
.item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.item-name-area{display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex:1}
.item-name{font-size:18px;font-weight:600;color:#1a1a1a}
.item-sub{font-size:12px;color:#aaa}
.item-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid #e0ddd5;cursor:pointer;padding:6px 10px;border-radius:7px;color:#666;font-size:14px;line-height:1;font-family:inherit}
.icon-btn:active{background:#f0ede6}
.icon-btn.danger:active{background:#ffeaea;color:#c0392b}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.metric{background:#f7f6f2;border-radius:9px;padding:7px 8px}
.metric-label{font-size:13px;color:#888;margin-bottom:3px}
.metric-row{display:flex;align-items:center;gap:3px}
.metric-val{font-size:22px;font-weight:600;color:#1a1a1a}
.metric-unit{font-size:14px;color:#aaa;margin-left:1px}
.num-input{width:48px;font-size:16px;font-weight:600;border:1px solid #ddd;border-radius:6px;padding:2px 2px;background:#fff;color:#1a1a1a;text-align:center;font-family:inherit}
.step-btn{background:#fff;border:1px solid #ddd;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#333;flex-shrink:0;font-family:inherit}
.step-btn:active{background:#f0ede6}
.stock-badge{font-size:12px;padding:2px 7px;border-radius:999px;display:inline-block;font-weight:500}
.s-ok{background:#e6f5ec;color:#1e7e3a}
.s-low{background:#fff3cd;color:#856404}
.s-zero{background:#fde8e8;color:#b91c1c}
.edit-row{display:none;margin-top:9px;padding-top:9px;border-top:1px solid #eee;flex-direction:column;gap:9px}
.edit-row.open{display:flex}
.edit-label{font-size:13px;color:#888;font-weight:600;margin-bottom:5px}
.edit-fields{display:flex;flex-wrap:wrap;gap:7px;align-items:flex-end}
.ef{display:flex;flex-direction:column;gap:3px}
.ef label{font-size:12px;color:#888}
.ef input,.ef select{border:1px solid #ddd;border-radius:8px;padding:6px 9px;font-size:13px;background:#f7f6f2;color:#1a1a1a;font-family:inherit;width:120px}
.alert-row{background:#f7f6f2;border-radius:9px;padding:8px 11px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.toggle-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:#1a1a1a;user-select:none}
.track{width:36px;height:20px;border-radius:999px;background:#ccc;position:relative;transition:background 0.2s;flex-shrink:0}
.track.on{background:#34c759}
.thumb{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left 0.15s;box-shadow:0 1px 2px rgba(0,0,0,0.2)}
.track.on .thumb{left:18px}
.thr-wrap{display:flex;align-items:center;gap:5px;font-size:13px;color:#555}
.thr-input{width:56px;border:1px solid #ddd;border-radius:7px;padding:5px 7px;font-size:14px;background:#fff;color:#1a1a1a;text-align:center;font-family:inherit}
.save-btn{background:#1a1a1a;color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:13px;cursor:pointer;margin-left:auto;font-family:inherit;font-weight:600}
.save-btn:active{opacity:0.8}
.empty{text-align:center;padding:2.5rem 1rem;color:#aaa;font-size:14px;line-height:1.8}
.loading{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.toast{position:fixed;bottom:calc(1.5rem + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:9px 20px;border-radius:999px;font-size:14px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:1.25rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom));width:100%;max-width:700px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:600;margin-bottom:1rem;text-align:center}
.fg{margin-bottom:12px}
.fg label{font-size:13px;color:#888;display:block;margin-bottom:4px}
.fg input,.fg select{width:100%;padding:12px 13px;border:1px solid #ddd;border-radius:12px;font-size:17px;background:#f7f6f2;color:#1a1a1a;font-family:inherit}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.modal-btns{display:flex;gap:8px;margin-top:1rem}
.mbtn{flex:1;border-radius:13px;padding:14px;font-size:16px;cursor:pointer;font-family:inherit;font-weight:600}
.mbtn.cancel{background:#f0ede6;border:none;color:#555}
.mbtn.cancel:active{background:#e0ddd5}
.mbtn.ok{background:#1a1a1a;color:#fff;border:none}
.mbtn.ok:active{opacity:0.8}
.genre-item{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:#f7f6f2;border-radius:9px;margin-top:6px}
.genre-item span{font-size:14px;color:#1a1a1a}
.genre-del{background:none;border:none;color:#c0392b;font-size:14px;cursor:pointer;padding:2px 6px;border-radius:5px;font-family:inherit}
.genre-del:active{background:#ffeaea}
.qr-modal-body{display:flex;flex-direction:column;align-items:center;padding:1rem 0}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>プゥル・ヴー在庫管理</h1>
    <div class="header-btns">
      <button class="sync-btn" id="sync-btn" onclick="loadAll()">↻</button>
      <button class="hbtn" onclick="openQRModal()">QR</button>
      <button class="hbtn" onclick="openGenreModal()">ジャンル</button>
      <button class="hbtn primary" onclick="openItemModal()">＋ 追加</button>
    </div>
  </div>

  <div class="tab-bar" id="tab-bar"></div>

  <div class="body">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="search-input" placeholder="品目名で検索..." oninput="renderItems()">
    </div>
    <div class="alert-banner" id="alert-banner">
      <div class="alert-title">⚠ 在庫アラート</div>
      <ul id="alert-list"></ul>
    </div>
    <div class="summary">
      <div class="stat"><div class="stat-label">品目数</div><div class="stat-value" id="total-items">—</div></div>
      <div class="stat"><div class="stat-label">総在庫</div><div class="stat-value" id="total-stock">—</div></div>
      <div class="stat"><div class="stat-label">在庫切れ</div><div class="stat-value" id="zero-items" style="color:#b91c1c">—</div></div>
    </div>
    <div class="items" id="items-list"><div class="loading">読み込み中...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 品目追加モーダル -->
<div class="modal-bg" id="item-modal">
  <div class="modal">
    <h2>品目を追加</h2>
    <div class="fg"><label>品目名</label><input type="text" id="new-name" placeholder="例：りんご"></div>
    <div class="fg"><label>ジャンル</label><select id="new-genre"></select></div>
    <div class="fg-row">
      <div class="fg" style="margin-bottom:0"><label>初期在庫数</label><input type="number" id="new-stock" value="0" min="0"></div>
      <div class="fg" style="margin-bottom:0"><label>単位</label><select id="new-unit"><option>個</option><option>本</option><option>袋</option><option>箱</option><option>枚</option><option>冊</option><option>台</option><option>kg</option><option>g</option><option>L</option></select></div>
    </div>
    <div class="fg"><label>メモ・備考</label><input type="text" id="new-memo" placeholder="任意"></div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeItemModal()">キャンセル</button>
      <button class="mbtn ok" onclick="addItem()">追加</button>
    </div>
  </div>
</div>

<!-- ジャンル管理モーダル -->
<div class="modal-bg" id="genre-modal">
  <div class="modal">
    <h2>ジャンル管理</h2>
    <div class="fg"><label>新しいジャンル名</label><input type="text" id="new-genre-name" placeholder="例：野菜"></div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeGenreModal()">閉じる</button>
      <button class="mbtn ok" onclick="addGenre()">追加</button>
    </div>
    <div id="genre-list"></div>
  </div>
</div>

<!-- QRモーダル -->
<div class="modal-bg" id="qr-modal">
  <div class="modal">
    <h2>アプリのQRコード</h2>
    <div class="qr-modal-body">
      <div id="qr-code" style="background:#fff;padding:16px;border-radius:12px;border:1px solid #e8e6e0"></div>
      <div style="margin-top:1rem;font-size:12px;color:#888;text-align:center">スマホのカメラで読み取ってください</div>
      <div style="margin-top:4px;font-size:11px;color:#ccc">etsu1617.github.io/pourvous-app</div>
    </div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeQRModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://xkonhzdahwbjqlaaauzm.supabase.co';
const SUPABASE_KEY='sb_publishable_1AnhQG4FZji6B4dBbmK39Q_jrPHuzmW';
const LINE_TOKEN_KEY='puruvuu_line_token';
const APP_URL='https://etsu1617.github.io/pourvous-app/';

async function api(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,opts);
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const t=await res.text();return t?JSON.parse(t):null;
}

let genres=['すべて'],items=[],currentGenre='すべて';

function isAl(i){return i.alert_on&&i.stock<=i.threshold;}
function badge(s){
  if(s===0)return '<span class="stock-badge s-zero">在庫切れ</span>';
  if(s<=10)return '<span class="stock-badge s-low">残りわずか</span>';
  return '<span class="stock-badge s-ok">在庫あり</span>';
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function setSyncing(on){document.getElementById('sync-btn').classList.toggle('spinning',on);}

async function loadAll(){
  setSyncing(true);
  try{
    const[gRows,iRows]=await Promise.all([api('genres?order=sort_order'),api('items?order=id')]);
    genres=['すべて',...gRows.map(g=>g.name)];
    items=iRows;
    renderTabs();renderItems();
    showToast('データを更新しました');
  }catch(e){showToast('通信エラー：'+e.message);}
  setSyncing(false);
}

function vis(){
  const q=(document.getElementById('search-input')?.value||'').trim().toLowerCase();
  let list=currentGenre==='すべて'?items:items.filter(i=>i.genre===currentGenre);
  if(q)list=list.filter(i=>i.name.toLowerCase().includes(q));
  return list;
}

function renderTabs(){
  document.getElementById('tab-bar').innerHTML=genres.map(g=>
    `<button class="gtab${g===currentGenre?' active':''}" onclick="setGenre('${g}')">${g}</button>`
  ).join('');
}
function setGenre(g){currentGenre=g;renderTabs();renderItems();}

function updateSummary(){
  const list=vis();
  document.getElementById('total-items').textContent=list.length;
  document.getElementById('total-stock').textContent=list.reduce((a,i)=>a+i.stock,0);
  document.getElementById('zero-items').textContent=list.filter(i=>i.stock===0).length;
}

function updateAlerts(){
  const al=items.filter(isAl);
  const b=document.getElementById('alert-banner');
  if(!al.length){b.classList.remove('show');return;}
  b.classList.add('show');
  document.getElementById('alert-list').innerHTML=al.map(i=>`<li>・ ${i.name}（${i.genre}）：${i.stock}${i.unit||'個'} / 設定${i.threshold}${i.unit||'個'}以下</li>`).join('');
  sendLineAlerts(al);
}

async function sendLineAlerts(al){
  const token=localStorage.getItem(LINE_TOKEN_KEY);
  if(!token)return;
  const msg=al.map(i=>`⚠ ${i.name}（${i.genre}）：在庫${i.stock}${i.unit||'個'}（設定：${i.threshold}${i.unit||'個'}以下）`).join('\n');
  try{await fetch('https://notify-api.line.me/api/notify',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/x-www-form-urlencoded'},body:'message='+encodeURIComponent('\nプゥル・ヴー在庫アラート\n'+msg)});}catch(e){}
}

function renderItems(){
  updateSummary();updateAlerts();
  const list=vis();const el=document.getElementById('items-list');
  if(!list.length){el.innerHTML='<div class="empty">品目がありません。<br>「＋ 追加」から登録してください。</div>';return;}
  el.innerHTML=list.map(item=>`
    <div class="item-card${isAl(item)?' alert-active':''}" id="card-${item.id}">
      <div class="item-top">
        <div class="item-name-area">
          <span class="item-name">${item.name}</span>
          ${isAl(item)?'<span style="font-size:12px">⚠</span>':''}
          ${badge(item.stock)}
          ${item.memo?`<span class="item-sub">${item.memo}</span>`:''}
        </div>
        <div class="item-actions">
          <button class="icon-btn" onclick="toggleEdit(${item.id})">✎</button>
          <button class="icon-btn danger" onclick="delItem(${item.id})">✕</button>
        </div>
      </div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">在庫数</div>
          <div class="metric-row">
            <span class="metric-val" id="sv-${item.id}">${item.stock}</span>
            <span class="metric-unit">${item.unit||'個'}</span>
          </div>
          ${item.price?`<div style="font-size:10px;color:#aaa;margin-top:2px">¥${(item.price*item.stock).toLocaleString()}</div>`:''}
        </div>
        <div class="metric">
          <div class="metric-label">入荷数</div>
          <div class="metric-row">
            <button class="step-btn" onclick="chgR(${item.id},-1)">−</button>
            <input class="num-input" type="number" id="r-${item.id}" value="${item.receipt}" min="0" onchange="setR(${item.id},this.value)" style="color:#1e7e3a">
            <button class="step-btn" onclick="chgR(${item.id},1)">＋</button>
          </div>
        </div>
        <div class="metric">
          <div class="metric-label">出庫数</div>
          <div class="metric-row">
            <button class="step-btn" onclick="chgI(${item.id},-1)">−</button>
            <input class="num-input" type="number" id="i-${item.id}" value="${item.issue}" min="0" onchange="setI(${item.id},this.value)" style="color:#b91c1c">
            <button class="step-btn" onclick="chgI(${item.id},1)">＋</button>
          </div>
        </div>
      </div>
      <div class="edit-row" id="er-${item.id}">
        <div>
          <div class="edit-label">基本情報</div>
          <div class="edit-fields">
            <div class="ef"><label>品目名</label><input type="text" id="ne-${item.id}" value="${item.name}"></div>
            <div class="ef"><label>ジャンル</label><select id="ge-${item.id}">${genres.filter(g=>g!=='すべて').map(g=>`<option${g===item.genre?' selected':''}>${g}</option>`).join('')}</select></div>
            <div class="ef"><label>在庫（直接修正）</label><input type="number" id="se-${item.id}" value="${item.stock}" min="0" style="width:90px"></div>
            <div class="ef"><label>単位</label><select id="ue-${item.id}"><option${(item.unit||'個')==='個'?' selected':''}>個</option><option${item.unit==='本'?' selected':''}>本</option><option${item.unit==='袋'?' selected':''}>袋</option><option${item.unit==='箱'?' selected':''}>箱</option><option${item.unit==='枚'?' selected':''}>枚</option><option${item.unit==='冊'?' selected':''}>冊</option><option${item.unit==='台'?' selected':''}>台</option><option${item.unit==='kg'?' selected':''}>kg</option><option${item.unit==='g'?' selected':''}>g</option><option${item.unit==='L'?' selected':''}>L</option></select></div>
            <div class="ef"><label>メモ・備考</label><input type="text" id="me-${item.id}" value="${item.memo||''}" style="width:160px"></div>
          </div>
        </div>
        <div>
          <div class="edit-label">アラート設定</div>
          <div class="alert-row">
            <div class="toggle-wrap" onclick="togAlert(${item.id})">
              <div class="track${item.alert_on?' on':''}" id="tr-${item.id}"><div class="thumb"></div></div>
              <span id="tl-${item.id}">${item.alert_on?'ON':'OFF'}</span>
            </div>
            <div class="thr-wrap" id="tw-${item.id}" style="${item.alert_on?'':'opacity:0.4;pointer-events:none'}">
              <span>在庫</span>
              <input class="thr-input" type="number" id="th-${item.id}" value="${item.threshold}" min="0">
              <span>${item.unit||'個'}以下でお知らせ</span>
            </div>
            <button class="save-btn" onclick="saveEdit(${item.id})">保存</button>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function toggleDetail(id){
  const d=document.getElementById(`detail-${{id}}`);
  const c=document.getElementById(`card-${{id}}`);
  const isOpen=d.style.display!=='none';
  d.style.display=isOpen?'none':'block';
  c.classList.toggle('expanded',!isOpen);
}
function toggleEdit(id){const r=document.getElementById(`er-${id}`);const c=document.getElementById(`card-${id}`);const o=r.classList.contains('open');r.classList.toggle('open',!o);c.classList.toggle('editing',!o);}

async function togAlert(id){
  const item=items.find(i=>i.id===id);const nv=!item.alert_on;item.alert_on=nv;
  document.getElementById(`tr-${id}`).classList.toggle('on',nv);
  document.getElementById(`tl-${id}`).textContent=nv?'ON':'OFF';
  const tw=document.getElementById(`tw-${id}`);tw.style.opacity=nv?'1':'0.4';tw.style.pointerEvents=nv?'auto':'none';
  document.getElementById(`card-${id}`).classList.toggle('alert-active',isAl(item));updateAlerts();
  try{await api(`items?id=eq.${id}`,'PATCH',{alert_on:nv});}catch(e){showToast('保存エラー');}
}

async function saveEdit(id){
  const item=items.find(i=>i.id===id);
  const n=document.getElementById(`ne-${id}`).value.trim();
  const g=document.getElementById(`ge-${id}`).value;
  const s=parseInt(document.getElementById(`se-${id}`).value)||0;
  const t=parseInt(document.getElementById(`th-${id}`).value)||0;
  const u=document.getElementById(`ue-${id}`).value;
  const p=item.price||0;
  const m=document.getElementById(`me-${id}`).value.trim();
  if(!n)return;
  const patch={name:n,genre:g,stock:Math.max(0,s),threshold:Math.max(0,t),receipt:0,issue:0,unit:u,price:p,memo:m};
  try{await api(`items?id=eq.${id}`,'PATCH',patch);Object.assign(item,patch);showToast('保存しました');renderItems();}
  catch(e){showToast('保存エラー：'+e.message);}
}

async function delItem(id){
  if(!confirm('この品目を削除しますか？'))return;
  try{await api(`items?id=eq.${id}`,'DELETE');items=items.filter(i=>i.id!==id);showToast('削除しました');renderItems();}
  catch(e){showToast('削除エラー');}
}

async function syncItem(id,patch){
  const item=items.find(i=>i.id===id);Object.assign(item,patch);
  const sv=document.getElementById(`sv-${id}`);const rv=document.getElementById(`r-${id}`);const iv=document.getElementById(`i-${id}`);
  if(sv)sv.textContent=item.stock;if(rv)rv.value=item.receipt;if(iv)iv.value=item.issue;
  const sv2=document.getElementById(`sv2-${{id}}`);if(sv2)sv2.textContent=item.stock;
  document.getElementById(`card-${id}`)?.classList.toggle('alert-active',isAl(item));
  updateSummary();updateAlerts();
  try{await api(`items?id=eq.${id}`,'PATCH',patch);}catch(e){showToast('通信エラー');}
}

function chgR(id,d){const i=items.find(x=>x.id===id);if(d<0&&i.receipt===0)return;syncItem(id,{receipt:Math.max(0,i.receipt+d),stock:Math.max(0,i.stock+d)});}
function setR(id,v){const i=items.find(x=>x.id===id);const nv=Math.max(0,parseInt(v)||0);const diff=nv-i.receipt;syncItem(id,{receipt:nv,stock:Math.max(0,i.stock+diff)});}
function chgI(id,d){const i=items.find(x=>x.id===id);if(d<0&&i.issue===0)return;const ni=Math.max(0,i.issue+d);syncItem(id,{issue:ni,stock:Math.max(0,i.stock-(ni-i.issue))});}
function setI(id,v){const i=items.find(x=>x.id===id);const nv=Math.max(0,parseInt(v)||0);const diff=nv-i.issue;syncItem(id,{issue:nv,stock:Math.max(0,i.stock-diff)});}

function populateSelect(){document.getElementById('new-genre').innerHTML=genres.filter(g=>g!=='すべて').map(g=>`<option>${g}</option>`).join('');}
function openItemModal(){populateSelect();['new-name','new-memo'].forEach(id=>document.getElementById(id).value='');document.getElementById('new-stock').value='0';document.getElementById('item-modal').classList.add('open');setTimeout(()=>document.getElementById('new-name').focus(),150);}
function closeItemModal(){document.getElementById('item-modal').classList.remove('open');}

async function addItem(){
  const name=document.getElementById('new-name').value.trim();
  const genre=document.getElementById('new-genre').value;
  const stock=parseInt(document.getElementById('new-stock').value)||0;
  const unit=document.getElementById('new-unit').value;
  const price=0;
  const memo=document.getElementById('new-memo').value.trim();
  if(!name||!genre)return;
  try{
    const rows=await api('items','POST',{name,genre,stock,receipt:0,issue:0,alert_on:true,threshold:10,unit,price,memo});
    items.push(rows[0]);currentGenre=genre;
    closeItemModal();showToast('追加しました');renderTabs();renderItems();
  }catch(e){showToast('追加エラー：'+e.message);}
}

function renderGenreList(){
  const el=document.getElementById('genre-list');const ug=genres.filter(g=>g!=='すべて');
  if(!ug.length){el.innerHTML='<div style="font-size:12px;color:#aaa;padding:8px 0">ジャンルがありません</div>';return;}
  el.innerHTML=ug.map(g=>`<div class="genre-item"><span>${g}</span><button class="genre-del" onclick="delGenre('${g}')">削除</button></div>`).join('');
}
function openGenreModal(){renderGenreList();document.getElementById('new-genre-name').value='';document.getElementById('genre-modal').classList.add('open');}
function closeGenreModal(){document.getElementById('genre-modal').classList.remove('open');renderTabs();renderItems();}

async function addGenre(){
  const n=document.getElementById('new-genre-name').value.trim();if(!n||genres.includes(n))return;
  try{await api('genres','POST',{name:n,sort_order:genres.length});genres.push(n);document.getElementById('new-genre-name').value='';showToast('ジャンルを追加しました');renderGenreList();}
  catch(e){showToast('追加エラー：'+e.message);}
}

async function delGenre(g){
  if(items.some(i=>i.genre===g)){alert(`「${g}」に品目があるため削除できません。\n先に品目を別のジャンルへ移動してください。`);return;}
  try{await api(`genres?name=eq.${encodeURIComponent(g)}`,'DELETE');genres=genres.filter(x=>x!==g);if(currentGenre===g)currentGenre='すべて';showToast('削除しました');renderGenreList();}
  catch(e){showToast('削除エラー');}
}

let qrGenerated=false;
function openQRModal(){
  document.getElementById('qr-modal').classList.add('open');
  if(!qrGenerated){
    new QRCode(document.getElementById('qr-code'),{text:APP_URL,width:220,height:220,colorDark:'#1a1a1a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
    qrGenerated=true;
  }
}
function closeQRModal(){document.getElementById('qr-modal').classList.remove('open');}

document.getElementById('item-modal').addEventListener('click',function(e){if(e.target===this)closeItemModal();});
document.getElementById('genre-modal').addEventListener('click',function(e){if(e.target===this)closeGenreModal();});
document.getElementById('qr-modal').addEventListener('click',function(e){if(e.target===this)closeQRModal();});

loadAll();
</script>
</body>
</html>
